services:
  fastapi:
    build: .
    volumes:
      - ./src:/app/src
      - ./conversations:/app/conversations
      - ./call.py:/app/call.py
    env_file:
      - .env
    ports:
      - "8000:8000"
      - "9090:9090"
      - "8084:8084"
    environment:
      - TELEPHONY_PROVIDER=${TELEPHONY_PROVIDER:-netgsm}
    restart: always
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: yabanmercini
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: kaptango_user
      MYSQL_PASSWORD: kaptango_password
    volumes:
      - ./mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10

  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./frontend:/usr/share/nginx/html:ro
    restart: always
    depends_on:
      - fastapi

  phpmyadmin:
    image: phpmyadmin:latest
    restart: always
    ports:
      - "8081:80"
    environment:
      - PMA_ARBITRARY=1
      - PMA_HOST=db
      - PMA_USER=kaptango_user
      - PMA_PASSWORD=kaptango_password
    depends_on:
      - db

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: always
    volumes:
      - ./frontend:/usr/share/nginx/html
    environment:
      - MYSQL_HOST=db
      - MYSQL_DATABASE=yabanmercini
      - MYSQL_USER=kaptango_user
      - MYSQL_PASSWORD=kaptango_password
      - ADMIN_USER=admin
      - ADMIN_PASS=admin_pass_123
    depends_on:
      - db

  freeswitch:
    build:
      context: docker/freeswitch
    restart: always
    network_mode: host
    volumes:
      - ./docker/freeswitch/sip_profiles/external/netgsm.xml:/etc/freeswitch/sip_profiles/external/netgsm.xml
      - ./docker/freeswitch/dialplan/public/netgsm_inbound.xml:/etc/freeswitch/dialplan/public/netgsm_inbound.xml
      - ./docker/freeswitch/vars/netgsm.xml:/etc/freeswitch/vars/netgsm.xml
    env_file:
      - .env
